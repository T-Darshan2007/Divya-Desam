<head>

<title>Map – 108 Divya Desams</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root {
    --crimson: #8B0000;
    --gold: #C9A84C;
    --gold-light: #F2D27A;
    --gold-dark: #8B6914;
    --cream: #FDF6E3;
    --dark: #1A0A00;
    --panel-bg: rgba(26,10,0,0.97);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--dark); font-family: 'Cormorant Garamond', serif; overflow: hidden; height: 100vh; }

  /* NAV */
  nav {
    position: fixed; top: 0; width: 100%; z-index: 1500;
    background: rgba(26,10,0,0.98); border-bottom: 1px solid rgba(201,168,76,0.3);
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 40px; height: 62px;
  }
  .nav-brand { font-family: 'Cinzel Decorative', cursive; font-size: 1.2rem; color: var(--gold-light); text-decoration: none; letter-spacing: 2px; }
  .nav-links { display: flex; gap: 32px; list-style: none; }
  .nav-links a { font-family: 'Cinzel', serif; font-size: 0.85rem; color: rgba(253,246,227,0.7); text-decoration: none; letter-spacing: 1px; transition: color 0.3s; }
  .nav-links a:hover, .nav-links a.active { color: var(--gold); }
  .nav-user { font-family: 'Cinzel', serif; font-size: 0.82rem; color: var(--gold); display: flex; align-items: center; gap: 8px; }
  .nav-user svg { width: 26px; height: 26px; }

  /* Hamburger */
  .nav-hamburger {
    display: none; flex-direction: column; justify-content: center;
    gap: 5px; background: none; border: none; cursor: pointer; padding: 4px;
  }
  .nav-hamburger span {
    display: block; width: 24px; height: 2px;
    background: var(--gold); border-radius: 2px; transition: all 0.3s;
  }
  .nav-hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .nav-hamburger.open span:nth-child(2) { opacity: 0; }
  .nav-hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  /* Mobile drawer */
  .nav-drawer {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(26,10,0,0.98); z-index: 1499;
    flex-direction: column; align-items: center; justify-content: center; gap: 40px;
  }
  .nav-drawer.open { display: flex; }
  .nav-drawer ul { list-style: none; display: flex; flex-direction: column; align-items: center; gap: 32px; }
  .nav-drawer ul a {
    font-family: 'Cinzel', serif; font-size: 1.4rem; color: rgba(253,246,227,0.8);
    text-decoration: none; letter-spacing: 2px; transition: color 0.3s;
  }
  .nav-drawer ul a:hover, .nav-drawer ul a.active { color: var(--gold); }
  .nav-drawer .drawer-user {
    font-family: 'Cinzel', serif; font-size: 0.9rem;
    color: var(--gold); display: flex; align-items: center; gap: 8px;
    border-top: 1px solid rgba(201,168,76,0.3); padding-top: 24px;
  }
  .nav-drawer .drawer-user svg { width: 26px; height: 26px; }

  /* LAYOUT */
  .layout {
    position: fixed; top: 62px; left: 0; right: 0; bottom: 0;
    display: grid; grid-template-columns: 360px 1fr;
  }

  /* SIDEBAR */
  .sidebar {
    background: var(--panel-bg); border-right: 1px solid rgba(201,168,76,0.2);
    display: flex; flex-direction: column; overflow: hidden;
    z-index: 100;
  }
  .sidebar-header {
    padding: 24px 24px 16px;
    border-bottom: 1px solid rgba(201,168,76,0.15);
    flex-shrink: 0;
  }
  .sidebar-header h2 {
    font-family: 'Cinzel Decorative', cursive; color: var(--gold-light);
    font-size: 1.2rem; margin-bottom: 14px;
  }
  .search-box {
    position: relative;
  }
  .search-box input {
    width: 100%; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(201,168,76,0.25); border-radius: 3px;
    padding: 10px 40px 10px 14px;
    color: var(--cream); font-family: 'Cormorant Garamond', serif; font-size: 1rem;
    outline: none; transition: border-color 0.3s;
  }
  .search-box input::placeholder { color: rgba(253,246,227,0.35); }
  .search-box input:focus { border-color: var(--gold); }
  .search-icon { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--gold); font-size: 1rem; }

  /* FILTERS */
  .filters {
    padding: 14px 24px; display: flex; gap: 8px; flex-wrap: wrap;
    border-bottom: 1px solid rgba(201,168,76,0.1); flex-shrink: 0;
  }
  .filter-btn {
    padding: 5px 14px; border-radius: 20px;
    border: 1px solid rgba(201,168,76,0.3);
    background: transparent; color: rgba(253,246,227,0.6);
    font-family: 'Cinzel', serif; font-size: 0.72rem; letter-spacing: 0.5px;
    cursor: pointer; transition: all 0.25s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--crimson); border-color: var(--crimson); color: var(--gold-light);
  }
  .count-badge {
    padding: 10px 24px; font-family: 'Cinzel', serif; font-size: 0.75rem;
    color: var(--gold); letter-spacing: 2px; border-bottom: 1px solid rgba(201,168,76,0.1);
    flex-shrink: 0;
  }

  /* TEMPLE LIST */
  .temple-list { overflow-y: auto; flex: 1; }
  .temple-list::-webkit-scrollbar { width: 4px; }
  .temple-list::-webkit-scrollbar-track { background: transparent; }
  .temple-list::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.3); border-radius: 2px; }
  .temple-item {
    padding: 14px 24px; border-bottom: 1px solid rgba(255,255,255,0.04);
    cursor: pointer; transition: background 0.2s; display: flex; align-items: flex-start; gap: 14px;
  }
  .temple-item:hover { background: rgba(201,168,76,0.07); }
  .temple-item.selected { background: rgba(139,0,0,0.25); border-left: 3px solid var(--crimson); }
  .temple-num {
    font-family: 'Cinzel', serif; color: var(--gold-dark); font-size: 0.75rem;
    min-width: 28px; padding-top: 3px; letter-spacing: 1px;
  }
  .temple-info { flex: 1; }
  .temple-name { font-family: 'Cinzel', serif; color: var(--gold-light); font-size: 0.9rem; margin-bottom: 3px; }
  .temple-loc { color: rgba(253,246,227,0.45); font-size: 0.9rem; }
  .temple-deity { color: var(--gold); font-size: 0.8rem; font-style: italic; margin-top: 2px; }
  .temple-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--gold);
    min-width: 8px; margin-top: 6px; opacity: 0.6;
  }

  /* MAP */
  #map { width: 100%; height: 100%; }
  .leaflet-container { background: #0d1117; }

  /* POPUP */
  .custom-popup .leaflet-popup-content-wrapper {
    background: rgba(26,10,0,0.97); border: 1px solid rgba(201,168,76,0.4);
    border-radius: 4px; box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    color: var(--cream); font-family: 'Cormorant Garamond', serif;
    min-width: 240px;
  }
  .custom-popup .leaflet-popup-tip { background: rgba(26,10,0,0.97); }
  .popup-num { font-family: 'Cinzel', serif; color: var(--gold); font-size: 0.75rem; letter-spacing: 2px; }
  .popup-name { font-family: 'Cinzel', serif; color: var(--gold-light); font-size: 1.1rem; margin: 4px 0 2px; }
  .popup-deity { color: var(--gold); font-style: italic; font-size: 0.95rem; }
  .popup-loc { color: rgba(253,246,227,0.55); font-size: 0.9rem; margin-top: 6px; }
  .popup-div { height: 1px; background: rgba(201,168,76,0.25); margin: 10px 0; }
  .popup-desc { font-size: 0.95rem; line-height: 1.6; color: rgba(253,246,227,0.75); }

  /* Info panel */
  .info-panel {
    position: absolute; bottom: 24px; right: 24px; z-index: 500;
    background: var(--panel-bg); border: 1px solid rgba(201,168,76,0.3);
    padding: 20px 24px; border-radius: 4px; min-width: 220px;
    animation: slideIn 0.4s ease;
  }
  @keyframes slideIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
  .info-stat { margin-bottom: 10px; }
  .info-stat-num { font-family: 'Cinzel Decorative', cursive; color: var(--gold-light); font-size: 1.8rem; }
  .info-stat-label { color: rgba(253,246,227,0.5); font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 2px; }

  /* Legend */
  .legend {
    position: absolute; bottom: 24px; left: 384px; z-index: 500;
    background: var(--panel-bg); border: 1px solid rgba(201,168,76,0.2);
    padding: 14px 18px; border-radius: 4px;
  }
  .legend-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-family: 'Cinzel', serif; font-size: 0.72rem; color: rgba(253,246,227,0.6); letter-spacing: 0.5px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; }

  @media (max-width: 768px) {
    nav { padding: 10px 16px; height: 56px; }
    .nav-links, .nav-user { display: none; }
    .nav-hamburger { display: flex; }

    .layout {
      top: 56px;
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
    }

    /* Sidebar visible on mobile as collapsible top panel */
    .sidebar {
      display: flex;
      max-height: 300px;
      border-right: none;
      border-bottom: 1px solid rgba(201,168,76,0.2);
    }
    .sidebar-header h2 { font-size: 1rem; margin-bottom: 10px; }
    .sidebar-header { padding: 14px 14px 10px; }
    .filters { padding: 10px 14px; }
    .filter-btn { font-size: 0.65rem; padding: 4px 10px; }
    .temple-list { font-size: 0.9rem; }
    .temple-item { padding: 10px 14px; gap: 10px; }

    .legend { left: 10px; bottom: 10px; padding: 10px 12px; }
    .legend-item { font-size: 0.65rem; gap: 6px; }

    .info-panel { right: 10px; bottom: 10px; min-width: 160px; padding: 14px 16px; }
  }
</style>
</head>

const stateColors = {
  "Tamil Nadu": "#C9A84C",
  "Kerala": "#E8748A",
  "Andhra Pradesh": "#7FCECD",
  "Uttar Pradesh": "#A8D8A8",
  "Nepal": "#B8A0E0",
  "other": "#AAAAAA"
};

// Init map
const map = L.map('map', { zoomControl: false }).setView([15.5, 80.0], 5);
L.control.zoom({ position: 'topright' }).addTo(map);

// Custom dark tile
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

let markers = [];
let selectedMarker = null;

function createIcon(color, size = 12) {
  return L.divIcon({
    html: `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};border:2px solid rgba(255,255,255,0.6);box-shadow:0 0 8px ${color}88;"></div>`,
    className: '',
    iconSize: [size, size],
    iconAnchor: [size/2, size/2]
  });
}

function buildList(list) {
  const el = document.getElementById('templeList');
  el.innerHTML = '';
  document.getElementById('countBadge').textContent = `Showing ${list.length} Temple${list.length !== 1 ? 's' : ''}`;
  list.forEach(t => {
    const item = document.createElement('div');
    item.className = 'temple-item';
    item.dataset.id = t.id;
    item.innerHTML = `
      <div class="temple-dot" style="background:${stateColors[t.state]||'#888'}"></div>
      <div class="temple-info">
        <div class="temple-num">${String(t.id).padStart(3,'0')}</div>
        <div class="temple-name">${t.name}</div>
        <div class="temple-deity">${t.deity}</div>
        <div class="temple-loc">${t.loc}</div>
      </div>`;
    item.addEventListener('click', () => focusTemple(t));
    el.appendChild(item);
  });
}

function focusTemple(t) {
  map.setView([t.lat, t.lng], 13, { animate: true, duration: 1.2 });
  if (markers[t.id]) markers[t.id].openPopup();
  document.querySelectorAll('.temple-item').forEach(i => i.classList.remove('selected'));
  const item = document.querySelector(`.temple-item[data-id="${t.id}"]`);
  if (item) { item.classList.add('selected'); item.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
}

// Add markers
temples.forEach(t => {
  const color = stateColors[t.state] || '#888';
  const marker = L.marker([t.lat, t.lng], { icon: createIcon(color) })
    .addTo(map)
    .bindPopup(`
      <div class="popup-num">Temple ${String(t.id).padStart(3,'0')}</div>
      <div class="popup-name">${t.name}</div>
      <div class="popup-deity">${t.deity}</div>
      <div class="popup-loc">📍 ${t.loc}</div>
      <div class="popup-div"></div>
      <div class="popup-desc">${t.desc}</div>
    `, { className: 'custom-popup', maxWidth: 300 });
  markers[t.id] = marker;
});

buildList(temples);

// Search
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.toLowerCase();
  const filtered = temples.filter(t =>
    t.name.toLowerCase().includes(q) ||
    t.loc.toLowerCase().includes(q) ||
    t.deity.toLowerCase().includes(q)
  );
  buildList(filtered);
});

// Filters
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    const filter = this.dataset.filter;
    const filtered = filter === 'all' ? temples : temples.filter(t => t.state === filter);
    buildList(filtered);
    if (filter !== 'all' && filtered.length) {
      const bounds = L.latLngBounds(filtered.map(t => [t.lat, t.lng]));
      map.fitBounds(bounds, { padding: [40, 40] });
    } else {
      map.setView([15.5, 80.0], 5);
    }
  });
});

// Username from localStorage
const storedName = localStorage.getItem('userName') || 'Seeker';
document.getElementById('navUsername').textContent = storedName;
document.getElementById('drawerUsername').textContent = storedName;

// Hamburger toggle
const hamburger = document.getElementById('hamburger');
const navDrawer = document.getElementById('navDrawer');
hamburger.addEventListener('click', () => {
  hamburger.classList.toggle('open');
  navDrawer.classList.toggle('open');
});
navDrawer.querySelectorAll('a').forEach(a => {
  a.addEventListener('click', () => {
    hamburger.classList.remove('open');
    navDrawer.classList.remove('open');
  });
});
</script>
